- title: "Fluorescence microscopy tensor imaging representations for large-scale dataset analysis"
  image: tensor_imaging.png
  description: Building a data representation technique capable of providing whole-organ tensor imaging representations of local regional descriptors based on fluorescence data acquisition. This method enables rapid, multiscale, analysis and virtualization of large-volume, high-resolution complex biological data while generating 3D tractographic representations.
  authors: Vinegoni<sup>#†</sup>, C., Feruglio†, P. F., Courties, G., Schmidt, S., Hulsmans, M., Lee, S., Wang, R., Sosnovik, D., Nahrendorf, M., and Weissleder, R
  link:
    url: 2020-SCIREP
    display: Scientific Reports, 10(1), 15 (2020)
  highlight: 1

- title: "Measurement of drug-target engagement in live cells by two-photon fluorescence anisotropy imaging"
  image: drug_imaging.png
  description: Imaging technique based on fluorescence anisotropy capable of measuring the binding interaction between molecules. Our technique allows the direct characterization of target engagement of fluorescently labeled drugs.
  authors: Vinegoni<sup>#†</sup>, C., Fumene Feruglio, P., Brand, C., Lee, S., Nibbs, A. E., Stapleton, S., Shah, S., Gryczynski, I., Reiner, T., Mazitschek, R., and Weissleder, R.
  link:
    url: 2017-NP
    display: Nature Protocols, 12(7), 1472 (2017)
  highlight: 1

- title: "Real-time high dynamic range laser scanning microscopy"
  image: hdr_imaging.png
  description: Optical imaging method for extending the imaging dynamic range in optical microscopy and improving the image signal-to-noise ratio.
  authors: Vinegoni<sup>#†</sup>, C., Swisher†, C. L., Fumene Feruglio†, P., Giedt, R. J., Rousso, D. L., Stapleton, S., and Weissleder, R.
  link:
    url: 2016-NCOMM-2
    display: Nature Communications, 7, 13 (2016)
