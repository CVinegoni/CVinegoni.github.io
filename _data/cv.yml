- title: <span style="color:purple">Research Areas</span>
  type: list
  contents:
    - My research background is in physics focused in the optical imaging field. Specifically in
      fluorescence, fluorescence polarization and time resolved imaging techniques, multiphoton and confocal microscopy,
      Raman spectroscopy, Coherent anti-Stokes Raman Scattering (CARS) imaging, optical coherence microscopy and
      tomography, mesoscopic imaging, optical projection tomography, and fluorescence molecular tomography in
      diffusive regime for whole mouse imaging.
    - My current research focuses on cancer imaging, drug imaging, neural imaging and cardiovascular imaging.
    - Development of novel optical imaging platforms for motion compensation for in vivo heart imaging, molecular and
      label-free imaging, high throughput
      imaging systems for drug-target engagement, in vivo and in vitro studies of pharmacodynamics for fluorescently
      labeled drugs, longitudinal microscopy imaging study of insulitis in mice, development of optical imaging modalities
      for in vivo imaging.
    - Development of novel data acquisition (hardware and software), image processing and signal processing tools for motion compensation of
      physiological motion in living mice models.
    - Development of software tools for image data analysis and mining for quantification and classification in
      systems biology.
    - I also work on machine learning and AI methods applied in microscopy image processing to facilitate cellular
      segmentation and image resolution and contrast.

